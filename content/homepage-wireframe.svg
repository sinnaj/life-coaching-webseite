<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2200" viewBox="0 0 1440 2200">
  <defs>
    <style>
      .bg { fill: #f5f2ec; }
      .frame { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .section { fill: #fdfdfd; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .hero { fill: #f8fafc; stroke: #0f172a; stroke-width: 2.5; }
      .chip { fill: #e2e8f0; stroke: #64748b; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .dark { fill: #0f172a; }
      .muted { fill: #475569; }
      .label { font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 18px; fill: #334155; }
      .tiny { font-family: Arial, sans-serif; font-size: 15px; fill: #475569; }
      .button { fill: #1f2937; }
      .buttonText { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #ffffff; }
      .sectionTitle { font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
      .sectionText { font-family: Arial, sans-serif; font-size: 17px; fill: #334155; }
      .nav { font-family: Arial, sans-serif; font-size: 16px; fill: #334155; }
      .footerText { font-family: Arial, sans-serif; font-size: 16px; fill: #e2e8f0; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2200"/>

  <text x="80" y="50" class="label">Homepage Wireframe - Visual Structure</text>
  <text x="80" y="78" class="tiny">Calm coaching website layout with clear CTA flow and trust building.</text>

  <!-- Main page frame -->
  <rect class="frame" x="60" y="100" width="1320" height="2000" rx="18"/>

  <!-- Header -->
  <rect class="section" x="90" y="130" width="1260" height="110" rx="14"/>
  <rect x="120" y="160" width="180" height="48" rx="10" class="chip"/>
  <text x="138" y="190" class="small">Logo / Site Name</text>
  <text x="890" y="190" class="nav">Startseite</text>
  <text x="980" y="190" class="nav">Angebote</text>
  <text x="1060" y="190" class="nav">Profil</text>
  <text x="1130" y="190" class="nav">Kontakt</text>
  <rect class="button" x="1200" y="148" width="130" height="54" rx="12"/>
  <text x="1221" y="182" class="buttonText">Termin anfragen</text>

  <!-- Hero -->
  <rect class="hero" x="90" y="270" width="1260" height="340" rx="20"/>
  <rect x="120" y="310" width="640" height="150" rx="16" class="chip"/>
  <text x="145" y="355" class="sectionTitle">Psychologisch fundiertes Life- und Mental-Coaching</text>
  <text x="145" y="392" class="sectionText">Mehr Klarheit, innere Stärke und Balance im Alltag.</text>
  <rect class="button" x="145" y="430" width="180" height="54" rx="12"/>
  <text x="168" y="464" class="buttonText">Termin anfragen</text>
  <rect x="340" y="430" width="180" height="54" rx="12" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="360" y="464" class="small">Angebote ansehen</text>
  <rect x="790" y="310" width="500" height="240" rx="18" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="970" y="430" class="sectionTitle" text-anchor="middle">Hero Image</text>
  <text x="970" y="460" class="small" text-anchor="middle">Portrait or calm abstract visual</text>

  <!-- Trust strip -->
  <rect class="section" x="90" y="640" width="1260" height="100" rx="16"/>
  <rect x="120" y="665" width="260" height="48" rx="10" class="chip"/>
  <text x="145" y="695" class="small">Psychologisch fundiert</text>
  <rect x="400" y="665" width="220" height="48" rx="10" class="chip"/>
  <text x="435" y="695" class="small">Online via Zoom</text>
  <rect x="640" y="665" width="230" height="48" rx="10" class="chip"/>
  <text x="672" y="695" class="small">Langjährige Erfahrung</text>
  <rect x="890" y="665" width="200" height="48" rx="10" class="chip"/>
  <text x="925" y="695" class="small">Klare Preise</text>

  <!-- Services -->
  <rect class="section" x="90" y="770" width="1260" height="360" rx="16"/>
  <text x="120" y="820" class="sectionTitle">Coaching-Angebote</text>
  <text x="120" y="850" class="sectionText">Service cards with duration, summary and detail link.</text>

  <rect class="card" x="120" y="880" width="275" height="210" rx="16"/>
  <text x="145" y="920" class="sectionTitle" font-size="20">Life Coaching</text>
  <text x="145" y="952" class="tiny">Persoenlichkeitsentwicklung</text>
  <text x="145" y="980" class="tiny">60 Minuten</text>
  <rect x="145" y="1010" width="120" height="36" rx="10" class="chip"/>
  <text x="160" y="1034" class="tiny">Mehr erfahren</text>

  <rect class="card" x="420" y="880" width="275" height="210" rx="16"/>
  <text x="445" y="920" class="sectionTitle" font-size="20">Raucherentwoehnung</text>
  <text x="445" y="952" class="tiny">Hypnose und Mental-Coaching</text>
  <text x="445" y="980" class="tiny">3 Sitzungen</text>
  <rect x="445" y="1010" width="120" height="36" rx="10" class="chip"/>
  <text x="460" y="1034" class="tiny">Mehr erfahren</text>

  <rect class="card" x="720" y="880" width="275" height="210" rx="16"/>
  <text x="745" y="920" class="sectionTitle" font-size="20">Alkohol selbstbestimmt</text>
  <text x="745" y="952" class="tiny">Kontrolliertes Trinken</text>
  <text x="745" y="980" class="tiny">Einzel- und Paketangebot</text>
  <rect x="745" y="1010" width="120" height="36" rx="10" class="chip"/>
  <text x="760" y="1034" class="tiny">Mehr erfahren</text>

  <rect class="card" x="1020" y="880" width="275" height="210" rx="16"/>
  <text x="1045" y="920" class="sectionTitle" font-size="20">Stressbewaeltigung</text>
  <text x="1045" y="952" class="tiny">Gelassen und sicher im Stress</text>
  <text x="1045" y="980" class="tiny">6 Sitzungen</text>
  <rect x="1045" y="1010" width="120" height="36" rx="10" class="chip"/>
  <text x="1060" y="1034" class="tiny">Mehr erfahren</text>

  <!-- About preview -->
  <rect class="section" x="90" y="1160" width="1260" height="260" rx="16"/>
  <text x="120" y="1210" class="sectionTitle">Profil im Kurzueberblick</text>
  <rect x="120" y="1240" width="220" height="150" rx="16" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="230" y="1320" class="small" text-anchor="middle">Portrait</text>
  <text x="390" y="1265" class="sectionText">Dipl.-Päd. Christiane Meik</text>
  <text x="390" y="1295" class="sectionText">Mental-Coach und zertifizierte Trainerin</text>
  <text x="390" y="1325" class="sectionText">Erfahrung in Psychotherapie, Suchtberatung und Sozialmanagement</text>
  <rect class="button" x="390" y="1350" width="150" height="46" rx="12"/>
  <text x="410" y="1380" class="buttonText" font-size="16">Zum Profil</text>

  <!-- Process -->
  <rect class="section" x="90" y="1450" width="1260" height="220" rx="16"/>
  <text x="120" y="1500" class="sectionTitle">So laeuft es ab</text>
  <rect x="120" y="1530" width="350" height="120" rx="16" class="chip"/>
  <text x="150" y="1570" class="sectionTitle" font-size="20">1. Anfrage senden</text>
  <text x="150" y="1600" class="tiny">Kurzes Kontaktformular oder E-Mail.</text>
  <rect x="495" y="1530" width="350" height="120" rx="16" class="chip"/>
  <text x="525" y="1570" class="sectionTitle" font-size="20">2. Erstgespraech</text>
  <text x="525" y="1600" class="tiny">Ziele, Bedarf und passendes Angebot klaeren.</text>
  <rect x="870" y="1530" width="350" height="120" rx="16" class="chip"/>
  <text x="900" y="1570" class="sectionTitle" font-size="20">3. Coaching starten</text>
  <text x="900" y="1600" class="tiny">Online begleiten und konkrete Schritte umsetzen.</text>

  <!-- Value -->
  <rect class="section" x="90" y="1700" width="1260" height="180" rx="16"/>
  <text x="120" y="1750" class="sectionTitle">Warum dieser Ansatz wirkt</text>
  <text x="120" y="1785" class="sectionText">Empathisch, loesungsorientiert, alltagstauglich und psychologisch fundiert.</text>
  <text x="120" y="1820" class="sectionText">Coaching statt allgemeiner Ratschlaege: individuell, strukturiert und konkret.</text>

  <!-- Closing CTA -->
  <rect class="hero" x="90" y="1910" width="1260" height="120" rx="18"/>
  <text x="120" y="1960" class="sectionTitle">Bereit fuer den naechsten Schritt?</text>
  <text x="120" y="1990" class="sectionText">Kontakt aufnehmen und das passende Coaching-Gespraech vereinbaren.</text>
  <rect class="button" x="1050" y="1940" width="220" height="54" rx="12"/>
  <text x="1080" y="1974" class="buttonText">Termin anfragen</text>

  <!-- Footer -->
  <rect class="dark" x="90" y="2060" width="1260" height="110" rx="16"/>
  <text x="120" y="2110" class="footerText">Impressum   |   Datenschutz   |   AGB / Honorar   |   Kontakt</text>
  <text x="120" y="2140" class="footerText">Online Coaching via Zoom   |   info(at)meik-gesundheit.de</text>
</svg>
