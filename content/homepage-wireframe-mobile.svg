<svg xmlns="http://www.w3.org/2000/svg" width="768" height="2800" viewBox="0 0 768 2800">
  <defs>
    <style>
      .bg { fill: #f5f2ec; }
      .frame { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .section { fill: #fdfdfd; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .hero { fill: #f8fafc; stroke: #0f172a; stroke-width: 2.5; }
      .chip { fill: #e2e8f0; stroke: #64748b; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .dark { fill: #0f172a; }
      .label { font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 16px; fill: #334155; }
      .tiny { font-family: Arial, sans-serif; font-size: 14px; fill: #475569; }
      .button { fill: #1f2937; }
      .buttonText { font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }
      .sectionTitle { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
      .sectionText { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
      .nav { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
      .footerText { font-family: Arial, sans-serif; font-size: 14px; fill: #e2e8f0; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="768" height="2800"/>
  <text x="40" y="42" class="label">Homepage Wireframe - Mobile Variant</text>
  <text x="40" y="66" class="tiny">Single-column layout for small screens.</text>

  <rect class="frame" x="24" y="90" width="720" height="2600" rx="18"/>

  <!-- Header -->
  <rect class="section" x="44" y="120" width="680" height="120" rx="14"/>
  <rect x="64" y="150" width="180" height="44" rx="10" class="chip"/>
  <text x="82" y="178" class="small">Logo / Site Name</text>
  <rect class="button" x="510" y="146" width="190" height="50" rx="12"/>
  <text x="528" y="178" class="buttonText">Termin anfragen</text>
  <text x="64" y="220" class="nav">Startseite   Angebote   Profil   Kontakt</text>

  <!-- Hero -->
  <rect class="hero" x="44" y="270" width="680" height="340" rx="18"/>
  <text x="64" y="322" class="sectionTitle">Psychologisch fundiertes Life- und Mental-Coaching</text>
  <text x="64" y="356" class="sectionText">Mehr Klarheit, innere Stärke und Balance im Alltag.</text>
  <rect class="button" x="64" y="390" width="170" height="48" rx="12"/>
  <text x="84" y="421" class="buttonText">Termin anfragen</text>
  <rect x="246" y="390" width="170" height="48" rx="12" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="260" y="421" class="small">Angebote ansehen</text>
  <rect x="64" y="455" width="620" height="130" rx="16" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="374" y="525" class="small" text-anchor="middle">Hero Image</text>

  <!-- Trust strip -->
  <rect class="section" x="44" y="640" width="680" height="180" rx="16"/>
  <text x="64" y="680" class="sectionTitle">Vertrauen auf einen Blick</text>
  <rect x="64" y="700" width="290" height="42" rx="10" class="chip"/>
  <text x="82" y="727" class="small">Psychologisch fundiert</text>
  <rect x="370" y="700" width="290" height="42" rx="10" class="chip"/>
  <text x="412" y="727" class="small">Online via Zoom</text>
  <rect x="64" y="752" width="290" height="42" rx="10" class="chip"/>
  <text x="82" y="779" class="small">Langjährige Erfahrung</text>
  <rect x="370" y="752" width="290" height="42" rx="10" class="chip"/>
  <text x="423" y="779" class="small">Klare Preise</text>

  <!-- Services -->
  <rect class="section" x="44" y="850" width="680" height="620" rx="16"/>
  <text x="64" y="892" class="sectionTitle">Coaching-Angebote</text>

  <rect class="card" x="64" y="920" width="620" height="110" rx="14"/>
  <text x="84" y="952" class="sectionTitle" font-size="18">Life Coaching</text>
  <text x="84" y="979" class="tiny">Persoenlichkeitsentwicklung - 60 Minuten</text>
  <rect x="530" y="946" width="130" height="34" rx="10" class="chip"/>
  <text x="545" y="968" class="tiny">Mehr erfahren</text>

  <rect class="card" x="64" y="1050" width="620" height="110" rx="14"/>
  <text x="84" y="1082" class="sectionTitle" font-size="18">Raucherentwoehnung</text>
  <text x="84" y="1109" class="tiny">Hypnose und Mental-Coaching - 3 Sitzungen</text>
  <rect x="530" y="1076" width="130" height="34" rx="10" class="chip"/>
  <text x="545" y="1098" class="tiny">Mehr erfahren</text>

  <rect class="card" x="64" y="1180" width="620" height="110" rx="14"/>
  <text x="84" y="1212" class="sectionTitle" font-size="18">Alkohol selbstbestimmt</text>
  <text x="84" y="1239" class="tiny">Kontrolliertes Trinken - Paket oder Einzeltermine</text>
  <rect x="530" y="1206" width="130" height="34" rx="10" class="chip"/>
  <text x="545" y="1228" class="tiny">Mehr erfahren</text>

  <rect class="card" x="64" y="1310" width="620" height="110" rx="14"/>
  <text x="84" y="1342" class="sectionTitle" font-size="18">Stressbewaeltigung</text>
  <text x="84" y="1369" class="tiny">Gelassen und sicher im Stress - 6 Sitzungen</text>
  <rect x="530" y="1336" width="130" height="34" rx="10" class="chip"/>
  <text x="545" y="1358" class="tiny">Mehr erfahren</text>

  <rect class="card" x="64" y="1440" width="620" height="110" rx="14"/>
  <text x="84" y="1472" class="sectionTitle" font-size="18">Autogenes Training</text>
  <text x="84" y="1499" class="tiny">Entspannung lernen und zuhause weiterueben</text>
  <rect x="530" y="1466" width="130" height="34" rx="10" class="chip"/>
  <text x="545" y="1488" class="tiny">Mehr erfahren</text>

  <!-- About preview -->
  <rect class="section" x="44" y="1510" width="680" height="280" rx="16"/>
  <text x="64" y="1552" class="sectionTitle">Profil im Kurzueberblick</text>
  <rect x="64" y="1570" width="150" height="150" rx="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="139" y="1650" class="tiny" text-anchor="middle">Portrait</text>
  <text x="232" y="1598" class="sectionText">Dipl.-Päd. Christiane Meik</text>
  <text x="232" y="1627" class="sectionText">Mental-Coach und zertifizierte Trainerin</text>
  <text x="232" y="1656" class="sectionText">Erfahrung in Praxis, Suchtarbeit und Sozialmanagement</text>
  <rect class="button" x="232" y="1688" width="130" height="44" rx="12"/>
  <text x="252" y="1716" class="buttonText" font-size="15">Zum Profil</text>

  <!-- Process -->
  <rect class="section" x="44" y="1820" width="680" height="260" rx="16"/>
  <text x="64" y="1862" class="sectionTitle">So laeuft es ab</text>
  <rect x="64" y="1890" width="620" height="52" rx="12" class="chip"/>
  <text x="84" y="1922" class="small">1. Anfrage senden</text>
  <rect x="64" y="1952" width="620" height="52" rx="12" class="chip"/>
  <text x="84" y="1984" class="small">2. Erstgespraech vereinbaren</text>
  <rect x="64" y="2014" width="620" height="52" rx="12" class="chip"/>
  <text x="84" y="2046" class="small">3. Coaching starten</text>

  <!-- Value -->
  <rect class="section" x="44" y="2110" width="680" height="180" rx="16"/>
  <text x="64" y="2152" class="sectionTitle">Warum dieser Ansatz wirkt</text>
  <text x="64" y="2185" class="sectionText">Empathisch, loesungsorientiert, alltagstauglich und psychologisch fundiert.</text>
  <text x="64" y="2215" class="sectionText">Individuell statt generisch, damit Veraenderung wirklich umsetzbar bleibt.</text>

  <!-- CTA -->
  <rect class="hero" x="44" y="2320" width="680" height="150" rx="18"/>
  <text x="64" y="2362" class="sectionTitle">Bereit fuer den naechsten Schritt?</text>
  <text x="64" y="2393" class="sectionText">Kontakt aufnehmen und das passende Coaching-Gespraech vereinbaren.</text>
  <rect class="button" x="64" y="2420" width="180" height="48" rx="12"/>
  <text x="86" y="2451" class="buttonText">Termin anfragen</text>

  <!-- Footer -->
  <rect class="dark" x="44" y="2490" width="680" height="180" rx="16"/>
  <text x="64" y="2540" class="footerText">Impressum</text>
  <text x="64" y="2568" class="footerText">Datenschutz</text>
  <text x="64" y="2596" class="footerText">AGB / Honorar</text>
  <text x="64" y="2624" class="footerText">Kontakt</text>
  <text x="64" y="2660" class="footerText">Online Coaching via Zoom</text>
  <text x="64" y="2688" class="footerText">info(at)meik-gesundheit.de</text>
</svg>
